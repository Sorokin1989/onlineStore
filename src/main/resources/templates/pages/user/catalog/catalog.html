<th:block th:fragment="content">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-header">Фильтры</div>
                <div class="card-body">
                    <form th:action="@{/templates/pages/user/catalog}" method="get">
                        <input type="text" name="query" class="form-control mb-2" placeholder="Поиск" th:value="${filter.query}">
                        <select name="categoryId" class="form-select mb-2">
                            <option value="">Все категории</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${filter.categoryId == c.id}"></option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100">Применить</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <div class="row">
                <div class="col-md-4 mb-4" th:each="p : ${products.content}">
                    <div class="card h-100">
                        <img th:src="${p.mainImage ?: '/images/no-image.jpg'}" class="card-img-top" style="height: 150px; object-fit: cover;">
                        <div class="card-body">
                            <h6 class="card-title" th:text="${p.name}"></h6>
                            <p class="text-danger fw-bold" th:text="${p.formattedPrice}"></p>
                            <a th:href="@{|/product/${p.slug}|}" class="btn btn-sm btn-primary w-100">Подробнее</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
