<th:block th:fragment="content">
    <div class="container">
        <h1 class="mb-4">Избранное</h1>

        <div class="row" th:if="${products != null and !products.isEmpty()}">
            <div class="col-md-12">
                <div class="row">
                    <div class="col-md-3 mb-4" th:each="product : ${products}">
                        <div class="card h-100 position-relative">
                            <div th:if="${product.discountPercent > 0}"
                                 class="position-absolute top-0 start-0 bg-danger text-white px-2 py-1 m-2 rounded">
                                -<span th:text="${product.discountPercent}"></span>%
                            </div>
                            <button class="position-absolute top-0 end-0 btn btn-link text-danger m-1"
                                    onclick="removeFromWishlist([[${product.id}]])"
                                    style="z-index: 10;">
                                <i class="fas fa-times-circle fa-lg"></i>
                            </button>
                            <img th:src="${product.mainImage ?: '/images/no-image.jpg'}"
                                 class="card-img-top" style="height: 180px; object-fit: cover;">
                            <div class="card-body">
                                <h6 class="card-title" th:text="${product.name}">Название товара</h6>
                                <div class="mb-2">
                                    <span class="text-danger fw-bold" th:text="${product.formattedPrice}">0 ₽</span>
                                    <span th:if="${product.oldPrice}" class="text-decoration-line-through text-muted ms-2"
                                          th:text="${#numbers.formatDecimal(product.oldPrice, 1, 'COMMA') + ' ₽'}"></span>
                                </div>
                                <div class="d-flex gap-2">
                                    <form th:action="@{/cart/add}" method="post" class="flex-grow-1">
                                        <input type="hidden" name="productId" th:value="${product.id}">
                                        <input type="hidden" name="quantity" value="1">
                                        <button type="submit" class="btn btn-primary btn-sm w-100">
                                            <i class="fas fa-shopping-cart"></i> В корзину
                                        </button>
                                    </form>
                                    <a th:href="@{|/product/${product.slug}|}" class="btn btn-outline-secondary btn-sm">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${products == null or products.isEmpty()}" class="text-center py-5">
            <i class="fas fa-heart fa-4x text-muted mb-3"></i>
            <p class="lead">Ваш список избранного пуст</p>
            <p class="text-muted">Добавляйте товары в избранное, чтобы не потерять их</p>
            <a th:href="@{/catalog}" class="btn btn-primary mt-3">Перейти в каталог</a>
        </div>
    </div>

    <script>
        function removeFromWishlist(productId) {
            if (confirm('Удалить товар из избранного?')) {
                fetch('/wishlist/remove/' + productId, { method: 'POST' })
                    .then(() => window.location.reload());
            }
        }
    </script>
</th:block>
