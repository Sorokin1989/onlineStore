<th:block th:fragment="content">
    <div class="container">
        <h1 class="mb-4">Мои заказы</h1>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-primary" th:text="${orders.size()}">0</h3>
                        <p class="text-muted mb-0">Всего заказов</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-warning" th:text="${#lists.size(orders.?[status == 'NEW'])}">0</h3>
                        <p class="text-muted mb-0">Новых</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-primary" th:text="${#lists.size(orders.?[status == 'PROCESSING'])}">0</h3>
                        <p class="text-muted mb-0">В обработке</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-success" th:text="${#lists.size(orders.?[status == 'DELIVERED'])}">0</h3>
                        <p class="text-muted mb-0">Доставлено</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${orders != null and !orders.isEmpty()}">
            <div class="card-header bg-primary text-white">
                Список заказов
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>№ заказа</th>
                            <th>Дата</th>
                            <th>Сумма</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td>
                                <a th:href="@{|/order/${order.orderNumber}|}" th:text="${order.orderNumber}">ORD-12345</a>
                            </td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2025</td>
                            <td class="text-danger fw-bold" th:text="${order.formattedTotal}">0 ₽</td>
                            <td>
                                    <span class="badge"
                                          th:classappend="${order.status == 'NEW'} ? 'bg-warning' :
                                                          (${order.status == 'PAID'} ? 'bg-info' :
                                                          (${order.status == 'PROCESSING'} ? 'bg-primary' :
                                                          (${order.status == 'DELIVERED'} ? 'bg-success' :
                                                          (${order.status == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary'))))"
                                          th:text="${order.statusDisplay}">Новый</span>
                            </td>
                            <td>
                                <a th:href="@{|/order/${order.orderNumber}|}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i> Детали
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
            <i class="fas fa-shopping-bag fa-4x text-muted mb-3"></i>
            <p class="lead">У вас пока нет заказов</p>
            <a th:href="@{/catalog}" class="btn btn-primary">Перейти в каталог</a>
        </div>
    </div>
</th:block>
