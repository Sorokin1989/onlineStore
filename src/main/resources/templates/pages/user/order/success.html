<th:block th:fragment="content">
    <div class="container">
        <div class="text-center py-5">
            <i class="fas fa-check-circle text-success fa-5x mb-4"></i>
            <h1 class="mb-3">Заказ успешно оформлен!</h1>
            <p class="lead mb-4">Спасибо за покупку. Наш менеджер свяжется с вами в ближайшее время.</p>

            <div class="card mb-4" style="max-width: 500px; margin: 0 auto;">
                <div class="card-body">
                    <h5>Номер вашего заказа:</h5>
                    <h3 class="text-primary" th:text="${order.orderNumber}">ORD-12345</h3>
                    <p class="text-muted">Сохраните этот номер для отслеживания заказа</p>
                </div>
            </div>

            <div class="card mb-4" style="max-width: 500px; margin: 0 auto;">
                <div class="card-body text-start">
                    <h5>Детали заказа:</h5>
                    <table class="table table-sm">
                        <tr>
                            <td>Статус:</td>
                            <td><span class="badge bg-warning" th:text="${order.statusDisplay}">Новый</span></td>
                        </tr>
                        <tr>
                            <td>Способ оплаты:</td>
                            <td th:text="${order.paymentMethodDisplay}">Банковская карта</td>
                        </tr>
                        <tr>
                            <td>Сумма:</td>
                            <td class="text-danger fw-bold" th:text="${order.formattedTotal}">0 ₽</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div th:if="${order.paymentMethod == 'CARD'}">
                <button class="btn btn-success btn-lg mb-3" onclick="payNow()">
                    <i class="fas fa-credit-card"></i> Оплатить сейчас
                </button>
            </div>

            <div class="mt-4">
                <a th:href="@{/catalog}" class="btn btn-outline-primary me-2">Продолжить покупки</a>
                <a th:href="@{|/order/${order.orderNumber}|}" class="btn btn-outline-secondary">Отслеживать заказ</a>
            </div>
        </div>
    </div>

    <script>
        function payNow() {
            window.location.href = '/payment/create/' + [[${order.id}]];
        }
    </script>
</th:block>
