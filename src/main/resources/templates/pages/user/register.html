<th:block th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Регистрация</div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label>Ваше имя</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label>Телефон</label>
                            <input type="tel" class="form-control" th:field="*{phone}">
                        </div>
                        <div class="mb-3">
                            <label>Пароль</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>
                        <div class="mb-3">
                            <label>Подтвердите пароль</label>
                            <input type="password" class="form-control" th:field="*{confirmPassword}" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                    </form>
                    <hr>
                    <a th:href="@{/login}" class="btn btn-secondary w-100">Уже есть аккаунт? Войти</a>
                </div>
            </div>
        </div>
    </div>
</th:block>
