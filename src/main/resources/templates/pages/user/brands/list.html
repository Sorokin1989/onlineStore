<th:block th:fragment="content">
    <div class="container">
        <h1 class="mb-4">Бренды</h1>

        <div class="row">
            <div class="col-md-3 mb-4" th:each="brand : ${brands}">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <img th:if="${brand.logo}" th:src="${brand.logo}" class="img-fluid mb-3" style="height: 80px; object-fit: contain;">
                        <div th:if="${!brand.logo}" class="mb-3">
                            <i class="fas fa-building fa-3x text-secondary"></i>
                        </div>
                        <h5 class="card-title" th:text="${brand.name}">Название бренда</h5>
                        <p class="card-text small text-muted" th:if="${brand.description}" th:text="${brand.description}"></p>
                        <a th:href="@{|/brands/${brand.slug}|}" class="btn btn-outline-primary btn-sm">Смотреть товары</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
