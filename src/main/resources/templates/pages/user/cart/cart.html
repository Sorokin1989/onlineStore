<th:block th:fragment="content">
    <h1>Корзина</h1>
    <div th:if="${cartItems.empty}">
        <p>Корзина пуста</p>
        <a th:href="@{/catalog}" class="btn btn-primary">Перейти в каталог</a>
    </div>
    <div th:if="${!cartItems.empty}">
        <table class="table">
            <thead>
            <tr>
                <th>Товар</th>
                <th>Цена</th>
                <th>Количество</th>
                <th>Сумма</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td><img th:src="${item.productImage}" width="50"> <span th:text="${item.productName}"></span></td>
                <td th:text="${item.productPrice}"></td>
                <td>
                    <form th:action="@{|/cart/update/${item.id}|}" method="post" class="d-inline">
                        <input type="number" name="quantity" th:value="${item.quantity}" style="width: 60px;" min="1" max="${item.maxAvailable}">
                        <button type="submit" class="btn btn-sm btn-secondary">Обновить</button>
                    </form>
                </td>
                <td th:text="${item.totalPrice}"></td>
                <td>
                    <form th:action="@{|/cart/remove/${item.id}|}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="3">Итого:</th>
                <th th:text="${total}"></th>
                <th></th>
            </tr>
            </tfoot>
        </table>
        <a th:href="@{/order/checkout}" class="btn btn-success">Оформить заказ</a>
        <a th:href="@{/catalog}" class="btn btn-secondary">Продолжить покупки</a>
    </div>
</th:block>
