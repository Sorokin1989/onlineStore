<th:block th:fragment="content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-key me-2"></i> Смена пароля
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

                        <form th:action="@{/profile/change-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Текущий пароль</label>
                                <input type="password" name="oldPassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Новый пароль</label>
                                <input type="password" name="newPassword" class="form-control" required>
                                <div class="form-text">Минимум 6 символов</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Подтвердите новый пароль</label>
                                <input type="password" name="confirmPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-save me-1"></i> Сохранить пароль
                            </button>
                        </form>

                        <hr>

                        <div class="text-center">
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i> Вернуться в профиль
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
