<th:block th:fragment="content">
    <div class="container">
        <h1 class="mb-4">Личный кабинет</h1>

        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="list-group">
                    <a th:href="@{/profile}" class="list-group-item list-group-item-action active">
                        <i class="fas fa-id-card me-2"></i> Профиль
                    </a>
                    <a th:href="@{/profile/edit}" class="list-group-item list-group-item-action">
                        <i class="fas fa-edit me-2"></i> Редактировать профиль
                    </a>
                    <a th:href="@{/profile/change-password}" class="list-group-item list-group-item-action">
                        <i class="fas fa-key me-2"></i> Сменить пароль
                    </a>
                    <a th:href="@{/order/my-orders}" class="list-group-item list-group-item-action">
                        <i class="fas fa-shopping-bag me-2"></i> Мои заказы
                    </a>
                    <a th:href="@{/wishlist}" class="list-group-item list-group-item-action">
                        <i class="fas fa-heart me-2"></i> Избранное
                    </a>
                    <a th:href="@{/logout}" class="list-group-item list-group-item-action text-danger"
                       onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                        <i class="fas fa-sign-out-alt me-2"></i> Выйти
                    </a>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-user-circle me-2"></i> Информация о профиле
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Имя:</div>
                            <div class="col-md-8" th:text="${user.fullName != null ? user.fullName : 'Не указано'}">Иван Иванов</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Email:</div>
                            <div class="col-md-8" th:text="${user.email}">ivan@example.com</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Телефон:</div>
                            <div class="col-md-8" th:text="${user.phone != null ? user.phone : 'Не указан'}">+7 (999) 123-45-67</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Роль:</div>
                            <div class="col-md-8">
                                <span th:text="${user.role == 'ROLE_ADMIN' ? 'Администратор' : 'Пользователь'}">Пользователь</span>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Дата регистрации:</div>
                            <div class="col-md-8" th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">01.01.2025</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/logout}" method="post" id="logout-form" style="display: none;"></form>
</th:block>
