<th:block th:fragment="content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-edit me-2"></i> Редактирование профиля
                    </div>
                    <div class="card-body">
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/profile/update}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Имя</label>
                                <input type="text" name="fullName" class="form-control" th:value="${user.fullName}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:value="${user.email}" disabled>
                                <div class="form-text">Email нельзя изменить</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Телефон</label>
                                <input type="tel" name="phone" class="form-control" th:value="${user.phone}">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-save me-1"></i> Сохранить изменения
                            </button>
                        </form>

                        <hr>

                        <div class="text-center">
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i> Вернуться в профиль
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
