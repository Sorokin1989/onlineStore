<th:block th:fragment="content">
    <div class="container">
        <h1 class="mb-4">Результаты поиска</h1>

        <div class="alert alert-info mb-4" th:if="${searchQuery}">
            <i class="fas fa-search me-2"></i> По запросу: <strong th:text="${searchQuery}"></strong>
            <span class="ms-3">Найдено: <strong th:text="${totalResults}"></strong> товаров</span>
        </div>

        <!-- Сортировка -->
        <div class="row mb-4" th:if="${totalResults > 0}">
            <div class="col-md-3 ms-auto">
                <select class="form-select" onchange="window.location.href=this.value">
                    <option th:selected="${param.sortBy == null or param.sortBy == 'newest'}"
                            value="?q=${searchQuery}&sortBy=newest">По новизне</option>
                    <option th:selected="${param.sortBy == 'price_asc'}"
                            value="?q=${searchQuery}&sortBy=price_asc">Цена по возрастанию</option>
                    <option th:selected="${param.sortBy == 'price_desc'}"
                            value="?q=${searchQuery}&sortBy=price_desc">Цена по убыванию</option>
                    <option th:selected="${param.sortBy == 'name_asc'}"
                            value="?q=${searchQuery}&sortBy=name_asc">Название (А-Я)</option>
                </select>
            </div>
        </div>

        <!-- Товары -->
        <div class="row" th:if="${totalResults > 0}">
            <div class="col-md-3 mb-4" th:each="product : ${products.content}">
                <div class="card h-100">
                    <img th:src="${product.mainImage ?: '/images/no-image.jpg'}"
                         class="card-img-top" style="height: 180px; object-fit: cover;">
                    <div class="card-body">
                        <h6 class="card-title" th:text="${product.name}">Название товара</h6>
                        <p class="text-danger fw-bold" th:text="${product.formattedPrice}">0 ₽</p>
                        <a th:href="@{|/product/${product.slug}|}" class="btn btn-sm btn-primary w-100">Подробнее</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Пагинация -->
        <nav th:if="${products.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${products.first} ? 'disabled' : ''">
                    <a class="page-link" th:href="@{/search(q=${searchQuery}, page=${products.number - 1}, sortBy=${param.sortBy})}">«</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    class="page-item" th:classappend="${i == products.number} ? 'active' : ''">
                    <a class="page-link" th:href="@{/search(q=${searchQuery}, page=${i}, sortBy=${param.sortBy})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${products.last} ? 'disabled' : ''">
                    <a class="page-link" th:href="@{/search(q=${searchQuery}, page=${products.number + 1}, sortBy=${param.sortBy})}">»</a>
                </li>
            </ul>
        </nav>

        <!-- Нет результатов -->
        <div class="text-center py-5" th:if="${totalResults == 0}">
            <i class="fas fa-search fa-4x text-muted mb-3"></i>
            <p class="lead">По вашему запросу ничего не найдено</p>
            <p class="text-muted">Попробуйте изменить поисковый запрос или перейти в <a th:href="@{/catalog}">каталог</a></p>
        </div>
    </div>
</th:block>
