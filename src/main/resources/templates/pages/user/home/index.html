<th:block th:fragment="content">
    <div class="bg-light p-5 rounded-3 mb-4 text-center">
        <h1 class="display-4">Добро пожаловать в магазин аксессуаров</h1>
        <a th:href="@{/catalog}" class="btn btn-primary btn-lg">В каталог</a>
    </div>

    <h2>Новинки</h2>
    <div class="row">
        <div class="col-md-3 mb-4" th:each="p : ${newProducts}">
            <div class="card h-100">
                <img th:src="${p.mainImage ?: '/images/no-image.jpg'}" class="card-img-top" style="height: 180px; object-fit: cover;" alt="">
                <div class="card-body">
                    <h5 class="card-title" th:text="${p.name}"></h5>
                    <p class="text-danger fw-bold" th:text="${p.formattedPrice}"></p>
                    <a th:href="@{|/product/${p.slug}|}" class="btn btn-sm btn-primary w-100">Подробнее</a>
                </div>
            </div>
        </div>
    </div>
</th:block>
