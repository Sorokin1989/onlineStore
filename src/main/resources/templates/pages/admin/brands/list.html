<th:block th:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Бренды</h1>
            <a th:href="@{/admin/brands/create}" class="btn btn-primary">
                + Создать бренд
            </a>
        </div>

        <!-- Сообщения -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Логотип</th>
                            <th>Название</th>
                            <th>Slug</th>
                            <th>Активен</th>
                            <th>Порядок</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="brand : ${brands}">
                            <td th:text="${brand.id}">1</td>
                            <td>
                                <img th:if="${brand.logo != null}"
                                     th:src="@{/uploads/__${brand.logo}__}"
                                     style="height: 40px; width: 40px; object-fit: cover;"
                                     class="img-thumbnail">
                                <span th:if="${brand.logo == null}">—</span>
                            </td>
                            <td th:text="${brand.name}">Бренд</td>
                            <td th:text="${brand.slug}">slug</td>
                            <td>
                                <span th:if="${brand.active == true}" class="badge bg-success">Активен</span>
                                <span th:if="${brand.active == false}" class="badge bg-secondary">Неактивен</span>
                            </td>
                            <td th:text="${brand.sortOrder}">0</td>
                            <td>
                                <a th:href="@{/admin/brands/edit/{id}(id=${brand.id})}"
                                   class="btn btn-sm btn-info">Ред.</a>
                                <form th:action="@{/admin/brands/delete/{id}(id=${brand.id})}"
                                      method="post" style="display: inline;"
                                      onsubmit="return confirm('Удалить бренд?')">
                                    <button type="submit" class="btn btn-sm btn-danger">Уд.</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${brands != null and brands.isEmpty()}">
                            <td colspan="7" class="text-center text-muted">
                                Нет брендов. <a th:href="@{/admin/brands/create}">Создать первый</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
