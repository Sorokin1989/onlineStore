<th:block th:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4" th:text="${category.id != null} ? 'Редактировать категорию' : 'Новая категория'">Форма категории</h1>

        <!-- Сообщения об ошибках -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${category.id != null} ? @{/admin/categories/update/{id}(id=${category.id})} : @{/admin/categories/create}"
                      method="post" th:object="${category}" onsubmit="return validateForm()">

                    <div class="mb-3">
                        <label class="form-label">Название *</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                        <div class="invalid-feedback">Введите название категории</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Slug (URL)</label>
                        <input type="text" class="form-control" th:field="*{slug}"
                               placeholder="автоматически из названия">
                        <small class="text-muted">Оставьте пустым для автоматической генерации</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Порядок сортировки</label>
                        <input type="number" class="form-control" th:field="*{sortOrder}" value="0">
                        <small class="text-muted">Меньше число = выше в списке</small>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" th:field="*{active}">
                        <label class="form-check-label">Активна</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">SEO заголовок</label>
                        <input type="text" class="form-control" th:field="*{seoTitle}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">SEO описание</label>
                        <textarea class="form-control" rows="3" th:field="*{seoDescription}"></textarea>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a th:href="@{/admin/categories}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
