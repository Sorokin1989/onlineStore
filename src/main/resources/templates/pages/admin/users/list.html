<th:block th:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4">Пользователи</h1>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Имя</th>
                            <th>Телефон</th>
                            <th>Роль</th>
                            <th>Дата регистрации</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.email}">email@example.com</td>
                            <td th:text="${user.fullName}">Имя</td>
                            <td th:text="${user.phone}">+7...</td>
                            <td>
                                <span th:if="${user.role == 'ROLE_ADMIN'}" class="badge bg-danger">Admin</span>
                                <span th:if="${user.role == 'ROLE_USER'}" class="badge bg-secondary">User</span>
                            </td>
                            <td th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">01.01.2025</td>
                            <td>
                                <form th:action="@{|/admin/users/${user.id}/role|}" method="post" class="d-inline">
                                    <select name="role" class="form-select form-select-sm d-inline w-auto">
                                        <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">Пользователь</option>
                                        <option value="ROLE_ADMIN" th:selected="${user.role == 'ROLE_ADMIN'}">Админ</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-warning">Изменить</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
