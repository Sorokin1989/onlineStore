<th:block th:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4" th:text="${product.id != null} ? 'Редактировать товар' : 'Новый товар'">Форма товара</h1>

        <!-- Сообщения об ошибках -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${product.id != null} ? @{/admin/products/update/{id}(id=${product.id})} : @{/admin/products/create}"
                      method="post" enctype="multipart/form-data" th:object="${product}"
                      onsubmit="return validateForm()" id="productForm">

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Название *</label>
                                <input type="text" class="form-control" th:field="*{name}" required
                                       oninput="generateSlug(this.value)">
                                <div class="invalid-feedback" id="nameError">Введите название товара</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Slug (URL)</label>
                                <input type="text" class="form-control" th:field="*{slug}"
                                       placeholder="автоматически из названия">
                                <small class="text-muted">Оставьте пустым для автоматической генерации</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Цена *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
                                <div class="invalid-feedback" id="priceError">Введите цену</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Старая цена (скидка)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{oldPrice}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Категория *</label>
                                <select class="form-select" th:field="*{categoryId}" required>
                                    <option value="">-- Выберите категорию --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                                <div class="invalid-feedback" id="categoryError">Выберите категорию</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Бренд</label>
                                <select class="form-select" th:field="*{brandId}">
                                    <option value="">-- Выберите бренд --</option>
                                    <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Количество</label>
                                <input type="number" class="form-control" th:field="*{quantity}">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" th:field="*{inStock}">
                                <label class="form-check-label">В наличии</label>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Главное изображение</label>
                                <input type="file" th:field="*{mainImageFile}" class="form-control" accept="image/*">

                                <!-- Показать выбранный файл при ошибке -->
                                <div th:if="${product.mainImageFile != null and product.mainImageFile.originalFilename != null}"
                                     class="mt-2 text-success">
                                    <small>✓ Выбран файл: <span th:text="${product.mainImageFile.originalFilename}"></span></small>
                                </div>

                                <!-- Показать текущее изображение при редактировании -->
                                <div th:if="${product.id != null and product.imagePath != null}" class="mt-2">
                                    <small>Текущее изображение:</small>
                                    <div class="mt-1">
                                        <img th:src="@{/uploads/__${product.imagePath}__}"
                                             style="max-height: 100px;" class="img-thumbnail">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" rows="5" th:field="*{description}"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{/admin/products}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
