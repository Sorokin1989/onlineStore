<th:block th:fragment="content">
    <div class="container-fluid">
        <!-- Кнопка назад -->
        <div class="mb-3">
            <a th:href="@{/admin}" class="btn btn-secondary">
                ← Назад в админ-панель
            </a>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Товары</h1>
            <a th:href="@{/admin/products/create}" class="btn btn-primary">+ Добавить товар</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Изображение</th>
                            <th>Название</th>
                            <th>Цена</th>
                            <th>Категория</th>
                            <th>В наличии</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}">1</td>
                            <td>
                                <img th:src="${product.mainImage != null ? '/uploads/' + product.mainImage : '/images/no-image.jpg'}"
                                     style="width: 50px; height: 50px; object-fit: cover;">
                            </td>
                            <td th:text="${product.name}">Название</td>
                            <td th:text="${product.formattedPrice}">0 ₽</td>
                            <td th:text="${product.categoryName}">Категория</td>
                            <td>
                                <span th:if="${product.inStock == true}" class="badge bg-success">В наличии</span>
                                <span th:if="${product.inStock == false}" class="badge bg-danger">Нет</span>
                            </td>
                            <td>
                                <a th:href="@{|/admin/products/edit/${product.id}|}" class="btn btn-sm btn-warning">✏️</a>
                                <form th:action="@{|/admin/products/delete/${product.id}|}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить товар?')">🗑️</button>
                                </form>
                                <a th:href="@{|/admin/products/images/${product.id}|}" class="btn btn-sm btn-info">📷</a>
                            </td>
                        </tr>
                        <tr th:if="${products == null or products.isEmpty()}">
                            <td colspan="7" class="text-center text-muted">
                                Нет товаров. <a th:href="@{/admin/products/create}">Добавить первый</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
