<th:block th:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Заказ № <span th:text="${order.orderNumber}"></span></h1>
            <a th:href="@{/admin/orders}" class="btn btn-secondary">← Назад</a>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">Информация о заказе</div>
                    <div class="card-body">
                        <p><strong>Статус:</strong>
                            <span class="badge"
                                  th:classappend="${order.status == 'NEW'} ? 'bg-warning' :
                                                  (${order.status == 'PAID'} ? 'bg-info' :
                                                  (${order.status == 'PROCESSING'} ? 'bg-primary' :
                                                  (${order.status == 'DELIVERED'} ? 'bg-success' : 'bg-secondary')))"
                                  th:text="${order.statusDisplay}"></span>
                        </p>
                        <p><strong>Дата:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
                        <p><strong>Способ оплаты:</strong> <span th:text="${order.paymentMethodDisplay}"></span></p>

                        <form th:action="@{|/admin/orders/${order.id}/status|}" method="post" class="mt-3">
                            <div class="row">
                                <div class="col-md-8">
                                    <select name="status" class="form-select">
                                        <option value="NEW" th:selected="${order.status == 'NEW'}">Новый</option>
                                        <option value="PAID" th:selected="${order.status == 'PAID'}">Оплачен</option>
                                        <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">В обработке</option>
                                        <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Доставлен</option>
                                        <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Отменён</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-primary w-100">Обновить</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Данные покупателя</div>
                    <div class="card-body">
                        <p><strong>Имя:</strong> <span th:text="${order.fullName}"></span></p>
                        <p><strong>Email:</strong> <span th:text="${order.email}"></span></p>
                        <p><strong>Телефон:</strong> <span th:text="${order.phone}"></span></p>
                        <p><strong>Адрес:</strong> <span th:text="${order.address}"></span></p>
                        <p th:if="${order.comment}"><strong>Комментарий:</strong> <span th:text="${order.comment}"></span></p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Товары в заказе</div>
                    <div class="card-body p-0">
                        <table class="table table-bordered mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Товар</th>
                                <th>Цена</th>
                                <th>Кол-во</th>
                                <th>Сумма</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.productName}">Товар</td>
                                <td th:text="${item.formattedPrice}">0 ₽</td>
                                <td th:text="${item.quantity}">1</td>
                                <td th:text="${item.formattedTotal}">0 ₽</td>
                            </tr>
                            </tbody>
                            <tfoot class="table-light">
                            <tr>
                                <th colspan="3" class="text-end">Итого:</th>
                                <th th:text="${order.formattedTotal}">0 ₽</th>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
