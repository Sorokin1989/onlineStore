<th:block th:fragment="content">
    <div class="container-fluid">
        <!-- Кнопка назад -->
        <div class="mb-3">
            <a th:href="@{/admin}" class="btn btn-secondary">
                ← Назад в админ-панель
            </a>
        </div>

        <h1 class="mb-4">Заказы</h1>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Номер</th>
                            <th>Покупатель</th>
                            <th>Сумма</th>
                            <th>Статус</th>
                            <th>Дата</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}">1</td>
                            <td th:text="${order.orderNumber}">ORD-12345</td>
                            <td th:text="${order.fullName}">Имя</td>
                            <td th:text="${order.formattedTotal}">0 ₽</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${order.status == 'NEW'} ? 'bg-warning' :
                                                      (${order.status == 'PAID'} ? 'bg-info' :
                                                      (${order.status == 'PROCESSING'} ? 'bg-primary' :
                                                      (${order.status == 'DELIVERED'} ? 'bg-success' : 'bg-secondary')))"
                                      th:text="${order.statusDisplay}">Новый</span>
                            </td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy')}">01.01.2025</td>
                            <td>
                                <a th:href="@{|/admin/orders/${order.id}|}" class="btn btn-sm btn-info">Просмотр</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
