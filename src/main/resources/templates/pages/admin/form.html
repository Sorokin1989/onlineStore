<th:block th:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4" th:text="${item.id != null} ? 'Редактировать' : 'Создать'">Форма</h1>

        <div class="card">
            <div class="card-body">
                <form th:action="${item.id != null} ? @{|/admin/${updateUrl}/${item.id}|} : @{|/admin/${createUrl}|}"
                      method="post" th:object="${item}">

                    <div class="mb-3">
                        <label class="form-label">Название</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" th:field="*{active}">
                        <label class="form-check-label">Активен</label>
                    </div>

                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{|/admin/${listUrl}|}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</th:block>
