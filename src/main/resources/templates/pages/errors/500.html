<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка сервера</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="error-container">
    <div class="error-card">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <h1>Ошибка 500</h1>
        <p th:text="${error} ?: 'Внутренняя ошибка сервера'">Внутренняя ошибка сервера</p>
        <a th:href="@{/}" class="btn">Вернуться на главную</a>
    </div>
</div>
</body>
</html>
