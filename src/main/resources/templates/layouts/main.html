<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<th:block th:replace="~{fragments/_head :: _head}"></th:block>
<body>
<th:block th:replace="~{fragments/_header :: _header}"></th:block>

<main class="container my-4">
    <!-- Пример использования sec:authorize прямо здесь -->
    <div sec:authorize="hasRole('ADMIN')" class="alert alert-info">
        Вы вошли как администратор
    </div>
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:replace="~{__${content}__}"></div>
</main>

<th:block th:replace="~{fragments/_footer :: _footer}"></th:block>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/validation.js}"></script>
<script th:src="@{/js/categoryValidation.js}"></script>
</body>
</html>
